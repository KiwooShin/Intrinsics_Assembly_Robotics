# Single-trial SFP collection config for demo collection
scoring:
  topics:
    - topic:
        name: "/joint_states"
        type: "sensor_msgs/msg/JointState"
    - topic:
        name: "/tf"
        type: "tf2_msgs/msg/TFMessage"
    - topic:
        name: "/tf_static"
        type: "tf2_msgs/msg/TFMessage"
        latched: true
    - topic:
        name: "/scoring/tf"
        type: "tf2_msgs/msg/TFMessage"
    - topic:
        name: "/aic/gazebo/contacts/off_limit"
        type: "ros_gz_interfaces/msg/Contacts"
    - topic:
        name: "/fts_broadcaster/wrench"
        type: "geometry_msgs/msg/WrenchStamped"
    - topic:
        name: "/aic_controller/joint_commands"
        type: "aic_control_interfaces/msg/JointMotionUpdate"
    - topic:
        name: "/aic_controller/pose_commands"
        type: "aic_control_interfaces/msg/MotionUpdate"
    - topic:
        name: "/scoring/insertion_event"
        type: "std_msgs/msg/String"
    - topic:
        name: "/aic_controller/controller_state"
        type: "aic_control_interfaces/msg/ControllerState"

task_board_limits:
  nic_rail:
    min_translation: -0.0215
    max_translation: 0.0234
  sc_rail:
    min_translation: -0.06
    max_translation: 0.055
  mount_rail:
    min_translation: -0.09425
    max_translation: 0.09425

trials:
  trial_1:
    scene:
      task_board:
        pose:
          x: 0.16
          y: -0.21
          z: 1.14
          roll: 0.0
          pitch: 0.0
          yaw: 3.1
        nic_rail_0:
          entity_present: False
        nic_rail_1:
          entity_present: False
        nic_rail_2:
          entity_present: True
          entity_name: "nic_card_2"
          entity_pose:
            translation: 0.016
            roll: 0.0
            pitch: 0.0
            yaw: 0.0
        nic_rail_3:
          entity_present: False
        nic_rail_4:
          entity_present: False
        sc_rail_0:
          entity_present: False
        sc_rail_1:
          entity_present: False
    tasks:
      task_1:
        plug_type: "sfp"
        target_module_name: "nic_card_mount_2"
        port_name: "sfp_port_0"
        time_limit: 180

model_configure_timeout_seconds: 60
model_discovery_timeout_seconds: 30
